<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link
        href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css'
        rel='stylesheet'>

    <title>Agendamento</title>

    <link
        rel="icon"
        href="./img/logo.png"
        type="image/png"
        sizes="32x32">

    <link
        rel="icon"
        href="./img/logo.png"
        type="image/png"
        sizes="192x192">

    <link
        rel="apple-touch-icon"
        href="./img/logo.png">

    <link
        rel="stylesheet"
        href="telaprefinal.css">

    <!-- JS CORRETO -->
    <script
        src="telaprefinal.js"
        defer>
    </script>

</head>

<body>

    <!-- HEADER -->

    <header class="main-header">

        <div class="header-left">

            <a href="tela_inicial.html">

                <img
                    src="./img/Logobonita.png"
                    alt="Logo ConnectNutri"
                    class="logoprincipal">

            </a>

        </div>

        <!-- BOTÃO CANCELAR -->

        <a
            href="agendamento.html"
            class="cancel-button">

            <img
                src="./img/CancelarAgendamento.png"
                alt="Ícone de cancelar">

            <span>Cancelar</span>

        </a>

    </header>

    <!-- CONTAINER -->

    <div class="container">

        <!-- SETA VOLTAR -->

        <a
            href="agendamento.html"
            class="back-arrow">

            <img
                src="./img/seta.png"
                alt="Voltar">

        </a>

        <!-- CONTEÚDO -->

        <div class="support-content">

            <h1>

                Antes de concluir o agendamento,
                preencha este formulário

            </h1>

            <!-- FORMULÁRIO -->

            <a
                href="https://forms.gle/L2Q2rNjR73m5mbHD7"
                target="_blank"
                rel="noopener noreferrer"
                class="form-link-box">

                <img
                    src="./img/Formulario.png"
                    alt="Ícone do Formulário">

                <span>Formulário</span>

            </a>

            <!-- BOTÃO PRÓXIMO -->

            <button
                class="next-button"
                id="confirmar-formulario">

                <span>PRÓXIMO</span>

                <img
                    src="./img/setaseguir.png"
                    alt="Ícone de seguir">

            </button>

        </div>

    </div>

</body>

</html>
